{% extends 'base.html' %}
{% block title %}Menu - FoodNShop{% endblock %}
{% block page_title %}📋 Menu{% endblock %}

{% block content %}
<div class="page-content">
  <div class="page-actions">
    <button class="btn btn-primary" onclick="openAddMenu()">+ Add Item</button>
    <div class="search-bar">
      <input type="text" id="menuSearch" placeholder="🔍 Search..." oninput="filterMenu()">
    </div>
  </div>

  <div class="filter-tabs" id="menuCatTabs"></div>
  <div id="menuList" class="item-list"></div>
</div>

<div id="addMenuModal" class="sheet-modal" style="display:none">
  <div class="sheet-handle"></div>
  <h3>📋 Add Menu Item</h3>
  <div class="form-group">
    <label>Item Name</label>
    <input type="text" id="mName" placeholder="Enter item name">
  </div>
  <div class="form-group">
    <label>Category</label>
    <select id="mCategory" onchange="updateMenuUnits()">
      {% if user.user_type == 'shop' %}
      <option value="dairy">🥛 Dairy</option>
      <option value="grains">🌾 Grains</option>
      <option value="pulses">🫘 Pulses</option>
      <option value="spices">🌶️ Spices</option>
      <option value="oil">🫒 Oil</option>
      <option value="other">📦 Other</option>
      {% else %}
      <option value="liquor">🥃 Liquor</option>
      <option value="beer">🍺 Beer</option>
      <option value="mocktail">🧃 Mocktail</option>
      <option value="cocktail">🍹 Cocktail</option>
      <option value="food">🍛 Food</option>
      <option value="soft_drink">🥤 Soft Drink</option>
      {% endif %}
    </select>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Price (₹)</label>
      <input type="number" id="mPrice" placeholder="0" step="0.5" min="0">
    </div>
    <div class="form-group">
      <label>Unit / Serving</label>
      <select id="mUnit"></select>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="btn btn-outline" onclick="closeSheet()">Cancel</button>
    <button class="btn btn-primary" onclick="saveMenu()">Save</button>
  </div>
</div>
<div id="sheetOverlay" class="sheet-overlay" onclick="closeSheet()" style="display:none"></div>
{% endblock %}

{% block scripts %}
<script>
const USER_TYPE = "{{ user.user_type }}";
const UNITS_MAP = {{ units_map|tojson }};
const CAT_LABELS = {
  all:'All', dairy:'🥛 Dairy', grains:'🌾 Grains', pulses:'🫘 Pulses',
  spices:'🌶️ Spices', oil:'🫒 Oil', other:'📦 Other',
  liquor:'🥃 Liquor', beer:'🍺 Beer', mocktail:'🧃 Mocktail',
  cocktail:'🍹 Cocktail', food:'🍛 Food', soft_drink:'🥤 Soft Drink'
};
let allItems = [];
let activeCategory = 'all';

async function loadAllMenu() {
  const res = await fetch('/menu/data');
  allItems = await res.json();
  renderMenuCats();
  renderMenuList();
}

function renderMenuCats() {
  const cats = ['all', ...new Set(allItems.map(i => i.category))];
  document.getElementById('menuCatTabs').innerHTML = cats.map(c =>
    `<button class="tab-btn ${c===activeCategory?'active':''}" onclick="setMenuCat('${c}')">${CAT_LABELS[c]||c}</button>`
  ).join('');
}

function setMenuCat(c) {
  activeCategory = c;
  renderMenuCats();
  renderMenuList();
}

function filterMenu() { renderMenuList(); }

function renderMenuList() {
  const q = document.getElementById('menuSearch').value.toLowerCase();
  let items = allItems.filter(i =>
    (activeCategory === 'all' || i.category === activeCategory) &&
    (!q || i.name.toLowerCase().includes(q))
  );
  if (!items.length) {
    document.getElementById('menuList').innerHTML = '<div class="empty-state">📋 No items found<br><small>Click + Add Item to get started</small></div>';
    return;
  }
  document.getElementById('menuList').innerHTML = items.map(i => `
    <div class="item-card">
      <div class="item-info">
        <div class="item-name">${i.name}</div>
        <div class="item-meta">${CAT_LABELS[i.category]||i.category} • ${i.unit}</div>
      </div>
      <div class="item-qty">
        <div class="price-tag">₹${i.price}</div>
        <div class="item-btns">
          <button class="icon-btn danger" onclick="deleteMenuItem(${i.id})">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openAddMenu() {
  document.getElementById('addMenuModal').style.display = 'block';
  document.getElementById('sheetOverlay').style.display = 'block';
  updateMenuUnits();
}

function closeSheet() {
  document.querySelectorAll('.sheet-modal').forEach(m => m.style.display = 'none');
  document.getElementById('sheetOverlay').style.display = 'none';
}

function updateMenuUnits() {
  const cat = document.getElementById('mCategory').value;
  const units = UNITS_MAP[cat] || ['piece'];
  document.getElementById('mUnit').innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join('');
}

async function saveMenu() {
  const data = {
    name: document.getElementById('mName').value.trim(),
    category: document.getElementById('mCategory').value,
    price: document.getElementById('mPrice').value,
    unit: document.getElementById('mUnit').value
  };
  if (!data.name || !data.price) { alert('Please enter item name and price!'); return; }
  await fetch('/menu/add', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  document.getElementById('mName').value = '';
  document.getElementById('mPrice').value = '';
  closeSheet();
  loadAllMenu();
}

async function deleteMenuItem(id) {
  if (!confirm('Delete this menu item?')) return;
  await fetch(`/menu/delete/${id}`, {method:'POST'});
  loadAllMenu();
}

loadAllMenu();
</script>
{% endblock %}

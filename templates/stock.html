{% extends 'base.html' %}
{% block title %}Stock - FoodNShop{% endblock %}
{% block page_title %}📦 Stock{% endblock %}

{% block content %}
<div class="page-content">
  <div class="page-actions">
    <button class="btn btn-primary" onclick="openAddStock()">+ Add Item</button>
    <div class="search-bar">
      <input type="text" id="stockSearch" placeholder="🔍 Search..." oninput="filterStock()">
    </div>
  </div>

  <div class="filter-tabs" id="catTabs"></div>

  <div id="stockList" class="item-list">
    <div class="loading">Loading...</div>
  </div>
</div>

<!-- Add Stock Sheet -->
<div id="addStockModal" class="sheet-modal" style="display:none">
  <div class="sheet-handle"></div>
  <h3>📦 Add Stock Item</h3>
  <div class="form-group">
    <label>Item Name</label>
    <input type="text" id="sName" placeholder="Enter item name">
  </div>
  <div class="form-group">
    <label>Category</label>
    <select id="sCategory" onchange="updateUnits()">
      {% if user.user_type == 'shop' %}
      <option value="dairy">🥛 Dairy (Milk, Curd)</option>
      <option value="grains">🌾 Grains (Rice, Wheat)</option>
      <option value="pulses">🫘 Pulses (Dal)</option>
      <option value="spices">🌶️ Spices (Masala)</option>
      <option value="oil">🫒 Oil</option>
      <option value="other">📦 Other</option>
      {% else %}
      <option value="liquor">🥃 Liquor</option>
      <option value="beer">🍺 Beer</option>
      <option value="mocktail">🧃 Mocktail</option>
      <option value="cocktail">🍹 Cocktail</option>
      <option value="food">🍛 Food</option>
      <option value="soft_drink">🥤 Soft Drink</option>
      {% endif %}
    </select>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Quantity</label>
      <input type="number" id="sQty" placeholder="0" step="0.1" min="0">
    </div>
    <div class="form-group">
      <label>Unit</label>
      <select id="sUnit"></select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Price (₹)</label>
      <input type="number" id="sPrice" placeholder="0" step="0.5" min="0">
    </div>
    <div class="form-group">
      <label>Min Stock Alert</label>
      <input type="number" id="sMinStock" placeholder="5" step="0.1" min="0">
    </div>
  </div>
  <div class="sheet-actions">
    <button class="btn btn-outline" onclick="closeSheet()">Cancel</button>
    <button class="btn btn-primary" onclick="saveStock()">Save</button>
  </div>
</div>

<!-- Update Stock Sheet -->
<div id="updateStockModal" class="sheet-modal" style="display:none">
  <div class="sheet-handle"></div>
  <h3 id="updateTitle">✏️ Update Stock</h3>
  <input type="hidden" id="updateId">
  <div class="form-row">
    <div class="form-group">
      <label>New Quantity</label>
      <input type="number" id="updateQty" step="0.1" min="0" class="big-input">
    </div>
    <div class="form-group">
      <label>Price (₹)</label>
      <input type="number" id="updatePrice" step="0.5" min="0">
    </div>
  </div>
  <div class="form-group">
    <label>Min Stock Alert</label>
    <input type="number" id="updateMinStock" step="0.1" min="0">
  </div>
  <div class="sheet-actions">
    <button class="btn btn-outline" onclick="closeSheet()">Cancel</button>
    <button class="btn btn-primary" onclick="saveUpdate()">Update</button>
  </div>
</div>

<div id="sheetOverlay" class="sheet-overlay" onclick="closeSheet()" style="display:none"></div>
{% endblock %}

{% block scripts %}
<script>
const USER_TYPE = "{{ user.user_type }}";
const UNITS_MAP = {{ units_map|tojson }};
let allItems = [];
let activeCategory = 'all';

async function loadStock() {
  const res = await fetch('/stock/data');
  allItems = await res.json();
  renderCategories();
  renderList();
}

function renderCategories() {
  const cats = ['all', ...new Set(allItems.map(i => i.category))];
  const labels = {
    all:'All', dairy:'🥛 Dairy', grains:'🌾 Grains', pulses:'🫘 Pulses',
    spices:'🌶️ Spices', oil:'🫒 Oil', other:'📦 Other',
    liquor:'🥃 Liquor', beer:'🍺 Beer', mocktail:'🧃 Mocktail',
    cocktail:'🍹 Cocktail', food:'🍛 Food', soft_drink:'🥤 Soft Drink'
  };
  document.getElementById('catTabs').innerHTML = cats.map(c =>
    `<button class="tab-btn ${c===activeCategory?'active':''}" onclick="setCategory('${c}')">${labels[c]||c}</button>`
  ).join('');
}

function setCategory(c) {
  activeCategory = c;
  renderCategories();
  renderList();
}

function filterStock() { renderList(); }

function renderList() {
  const q = document.getElementById('stockSearch').value.toLowerCase();
  let items = allItems.filter(i =>
    (activeCategory === 'all' || i.category === activeCategory) &&
    (!q || i.name.toLowerCase().includes(q))
  );
  if (!items.length) {
    document.getElementById('stockList').innerHTML = '<div class="empty-state">📦 No items found<br><small>Click + Add Item to get started</small></div>';
    return;
  }
  document.getElementById('stockList').innerHTML = items.map(i => `
    <div class="item-card ${i.low ? 'item-low' : ''}">
      <div class="item-info">
        <div class="item-name">${i.name} ${i.low ? '⚠️' : ''}</div>
        <div class="item-meta">${i.category} • ₹${i.price}/${i.unit} • Min: ${i.min_stock}</div>
      </div>
      <div class="item-qty">
        <div class="qty-display ${i.low ? 'qty-low' : ''}">${i.quantity} <small>${i.unit}</small></div>
        <div class="item-btns">
          <button class="icon-btn" onclick="openUpdateStock(${i.id}, ${i.quantity}, ${i.price}, ${i.min_stock}, '${i.name}', '${i.unit}')">✏️</button>
          <button class="icon-btn danger" onclick="deleteItem(${i.id})">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openAddStock() {
  document.getElementById('addStockModal').style.display = 'block';
  document.getElementById('sheetOverlay').style.display = 'block';
  updateUnits();
}

function openUpdateStock(id, qty, price, minStock, name, unit) {
  document.getElementById('updateId').value = id;
  document.getElementById('updateTitle').textContent = '✏️ Update: ' + name;
  document.getElementById('updateQty').value = qty;
  document.getElementById('updatePrice').value = price;
  document.getElementById('updateMinStock').value = minStock;
  document.getElementById('updateStockModal').style.display = 'block';
  document.getElementById('sheetOverlay').style.display = 'block';
  setTimeout(() => document.getElementById('updateQty').focus(), 100);
}

function closeSheet() {
  document.querySelectorAll('.sheet-modal').forEach(m => m.style.display = 'none');
  document.getElementById('sheetOverlay').style.display = 'none';
}

function updateUnits() {
  const cat = document.getElementById('sCategory').value;
  const units = UNITS_MAP[cat] || ['piece'];
  document.getElementById('sUnit').innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join('');
}

async function saveStock() {
  const data = {
    name: document.getElementById('sName').value.trim(),
    category: document.getElementById('sCategory').value,
    quantity: document.getElementById('sQty').value,
    unit: document.getElementById('sUnit').value,
    price: document.getElementById('sPrice').value,
    min_stock: document.getElementById('sMinStock').value || 5
  };
  if (!data.name || !data.quantity || !data.price) {
    alert('Please fill all required fields!'); return;
  }
  await fetch('/stock/add', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  // Clear form
  document.getElementById('sName').value = '';
  document.getElementById('sQty').value = '';
  document.getElementById('sPrice').value = '';
  document.getElementById('sMinStock').value = '';
  closeSheet();
  loadStock();
}

async function saveUpdate() {
  const id = document.getElementById('updateId').value;
  const data = {
    quantity: parseFloat(document.getElementById('updateQty').value),
    price: parseFloat(document.getElementById('updatePrice').value),
    min_stock: parseFloat(document.getElementById('updateMinStock').value)
  };
  if (isNaN(data.quantity) || isNaN(data.price)) {
    alert('Please enter valid quantity and price.'); return;
  }
  await fetch(`/stock/update/${id}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  closeSheet();
  loadStock();
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  await fetch(`/stock/delete/${id}`, {method:'POST'});
  loadStock();
}

loadStock();
</script>
{% endblock %}
